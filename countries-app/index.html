<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>World Countries Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>World Countries Explorer</h1>
            <p>Explore countries from around the world</p>
        </div>
    </header>
    <main class="container">
        <div class="controls">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for a country..."
                    aria-label="Search countries">
            </div>
            <div class="filter-box">
                <select id="regionFilter" aria-label="Filter by region">
                    <option value="all">All Regions</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>
        </div>
        <div id="loadingMessage" class="loading">
            <div class="spinner"></div>
            <p>Loading countries...</p>
        </div>
        <div id="errorMessage" class="error-message" style="display: none;">
            <p>Unable to load countries. Please try again later.</p>
        </div>
        <div id="countriesContainer" class="countries-grid"></div>
        <div id="noResults" class="no-results" style="display: none;">
            <p>No countries found matching your search.</p>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2024 World Countries Explorer | Data from <a href="https://restcountries.com/v3.1/all" target="_blank">REST Countries API</a></p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
